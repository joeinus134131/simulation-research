<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Research Journal | Joeinus Research Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #d4af37; /* Gold accent for book feel */
            --bg-paper: #fdfbf7;
            --text-main: #2c2c2c;
            --text-muted: #666;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .serif {
            font-family: 'Cormorant Garamond', serif;
        }

        /* Premium Header / Hero */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(rgba(253, 251, 247, 0.8), rgba(253, 251, 247, 0.8)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&q=80&w=2000');
            background-attachment: fixed;
            background-size: cover;
            border-bottom: 1px solid #eee;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            color: var(--primary);
        }

        .hero p {
            font-size: 1.25rem;
            max-width: 600px;
            color: var(--text-muted);
            font-style: italic;
        }

        .gold-divider {
            width: 80px;
            height: 2px;
            background-color: var(--accent);
            margin: 2rem 0;
        }

        /* Filter Section */
        .controls {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            padding: 1.5rem 0;
        }

        .filter-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid #ddd;
            color: var(--text-muted);
        }

        .filter-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn:hover:not(.active) {
            background-color: #f0f0f0;
        }

        /* Book Grid */
        .research-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 3rem;
            padding: 4rem 0;
        }

        .book-card {
            display: flex;
            flex-direction: column;
            group: hover;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .book-card:hover {
            transform: translateY(-10px);
        }

        .book-cover-container {
            position: relative;
            aspect-ratio: 3/4;
            background: #eee;
            border-radius: 4px 12px 12px 4px;
            overflow: hidden;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            perspective: 1000px;
        }

        .book-cover-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 5%, rgba(255,255,255,0.1) 10%, rgba(0,0,0,0) 15%);
            pointer-events: none;
        }

        .book-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .book-card:hover .book-cover-img {
            transform: scale(1.05);
        }

        .book-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .book-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
            margin-bottom: 0.75rem;
        }

        .book-summary {
            font-size: 0.95rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }

        .book-meta {
            margin-top: auto;
            padding-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #999;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-paper);
        }
        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }

        /* Search Bar Customization */
        .search-input {
            background: transparent;
            border-bottom: 1px solid #ccc;
            padding: 0.5rem 0;
            width: 100%;
            max-width: 300px;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .hero { height: 60vh; }
        }

        /* Fade-in Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeInUp 0.8s ease forwards;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Hero Section -->
    <header class="hero">
        <h1 class="fade-in">The Research Journal</h1>
        <div class="gold-divider fade-in" style="animation-delay: 0.2s"></div>
        <p class="fade-in" style="animation-delay: 0.4s">A curated collection of deep research, technical analysis, and strategic insights by Joeinus.</p>
    </header>

    <!-- Controls & Filters -->
    <div class="controls">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex flex-wrap justify-center gap-3" id="category-filters">
                <button class="filter-btn active" data-category="all">All Entries</button>
                <!-- Categories will be injected here -->
            </div>
            <div class="relative w-full md:w-auto">
                <input type="text" id="search-box" placeholder="Cari riset..." class="search-input">
                <span class="absolute right-0 top-2 opacity-30">🔍</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 min-h-screen">
        <div class="research-grid" id="papers-grid">
            <!-- Paper cards will be injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-20 mt-20 text-center">
        <div class="max-w-2xl mx-auto px-6">
            <div class="serif text-3xl font-bold mb-4">Joeinus Research</div>
            <p class="text-gray-500 mb-8 italic">"Synthesizing complexity into clarity."</p>
            <div class="flex justify-center gap-6 text-sm text-gray-400">
                <a href="https://github.com/joeinus134131" class="hover:text-accent">Github</a>
                <a href="https://www.linkedin.com/in/madeagusandigunawan/" class="hover:text-accent">LinkedIn</a>
                <a href="https://research.joeinus.site/" class="hover:text-accent">About</a>
            </div>
            <div class="mt-12 text-xs text-gray-300 uppercase tracking-widest">
                &copy; 2026 Private Intelligence & Research Library
            </div>
        </div>
    </footer>

    <!-- Configuration Loading -->
    <script src="library-config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const papersGrid = document.getElementById('papers-grid');
            const categoryFilters = document.getElementById('category-filters');
            const searchBox = document.getElementById('search-box');
            
            let currentFilter = 'all';
            let searchQuery = '';

            // Inject Categories
            libraryConfig.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.category = cat.id;
                btn.textContent = cat.name;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = cat.id;
                    renderPapers();
                });
                categoryFilters.appendChild(btn);
            });

            // Initial Render
            renderPapers();

            // Search listener
            searchBox.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderPapers();
            });

            function renderPapers() {
                papersGrid.innerHTML = '';
                
                const filteredPapers = libraryConfig.papers.filter(paper => {
                    const matchesCategory = currentFilter === 'all' || paper.category === currentFilter;
                    const matchesSearch = paper.title.toLowerCase().includes(searchQuery) || 
                                         paper.summary.toLowerCase().includes(searchQuery) ||
                                         paper.tags.some(tag => tag.toLowerCase().includes(searchQuery));
                    return matchesCategory && matchesSearch;
                });

                if (filteredPapers.length === 0) {
                    papersGrid.innerHTML = `
                        <div class="col-span-full py-20 text-center text-gray-400">
                            <p class="text-xl serif italic">No entries found matching your criteria.</p>
                        </div>
                    `;
                    return;
                }

                filteredPapers.forEach((paper, index) => {
                    const card = document.createElement('div');
                    card.className = 'book-card fade-in';
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    card.innerHTML = `
                        <div class="book-cover-container" onclick="window.location.href='${paper.path}'">
                            <img src="${paper.coverImage}" class="book-cover-img" alt="${paper.title}">
                            <div class="absolute inset-0 bg-black/20 opacity-0 hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="bg-white/90 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider text-black">Read Paper</span>
                            </div>
                        </div>
                        <div class="book-category">${libraryConfig.categories.find(c => c.id === paper.category)?.name || paper.category}</div>
                        <h3 class="book-title" onclick="window.location.href='${paper.path}'">${paper.title}</h3>
                        <p class="book-summary">${paper.summary}</p>
                        <div class="book-meta">
                            <span>${new Date(paper.date).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                            <div class="flex gap-2">
                                ${paper.tags.slice(0, 2).map(tag => `<span class="bg-gray-100 px-2 py-0.5 rounded text-[10px]">${tag}</span>`).join('')}
                            </div>
                        </div>
                    `;
                    papersGrid.appendChild(card);
                });
            }

            // Handle "All Entries" filter click
            document.querySelector('[data-category="all"]').addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = 'all';
                renderPapers();
            });
        });
    </script>
</body>
</html>
